services:
  server:
    build: .
    environment:
      - PORT=3000
      # Change 'localhost' to 'redis-1' (matching the service name below)
      - REDIS_URL=redis://redis-1:6379 
    ports:
      - "3000:3000"
    depends_on:
      - redis-1

  redis-1: 
    image: redis/redis-stack-server:latest
    ports:
      - "6379:6379"