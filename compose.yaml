version: "3.9"

services:
  server:
    build: .
    environment:
      - PORT=3000
      - REDIS_URL=redis://redis-1:6379
      - CORS_ORIGIN=*
    ports:
      - "3000:3000"
    depends_on:
      - redis-1
    restart: unless-stopped

  client:
    build: ./client
    environment:
      - NEXT_PUBLIC_SOCKET_URL=http://localhost:3000
    ports:
      - "3001:3000"
    depends_on:
      - server
    restart: unless-stopped

  redis-1:
    image: redis/redis-stack-server:latest
    volumes:
      - redis-data:/data
    restart: unless-stopped

volumes:
  redis-data: